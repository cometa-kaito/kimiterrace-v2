# ローカル開発用 PostgreSQL（pgvector 拡張入り）
# 本番 Cloud SQL for PostgreSQL 16 と同等の image を使う（CI と揃える）。
#
# 起動:
#   docker compose -f infrastructure/docker/docker-compose.dev.yml up -d
# 停止:
#   docker compose -f infrastructure/docker/docker-compose.dev.yml down
# データ破棄:
#   docker compose -f infrastructure/docker/docker-compose.dev.yml down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kimiterrace-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kimiterrace_dev
      # 日本語ロケール（本番 Cloud SQL に合わせる）
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kimiterrace_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    name: kimiterrace-postgres-data
