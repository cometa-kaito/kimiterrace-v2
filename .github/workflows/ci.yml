name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Biome
        run: pnpm exec biome ci .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kimiterrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kimiterrace_test

  # ---------------------------------------------------------------------------
  # e2e (Playwright) — F0 #48-O。
  #
  # 第 1 増分 (#205): DB / 認証非依存の /login 描画スモーク。
  # 第 2 増分 (#48-O-2): 公開サイネージ golden-path。Playwright の globalSetup が下記
  #   Postgres service を migrate + seed (1 校 1 学年 1 クラス + 有効 magic link + 当日
  #   daily_data) し、webServer (next build + start) が DATABASE_URL 付きで boot、
  #   signage.spec.ts が /signage/{token} の描画を実ブラウザで検証する。
  #   service / DATABASE_URL / KIMITERRACE_TEST_DB_OK は test ジョブと同方針 (使い捨て test DB)。
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kimiterrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # globalSetup (migrate+seed) / webServer (signage の getDb) / test workers が共有。
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kimiterrace_test
      # 使い捨て test DB であることを globalSetup のガードに明示 (test ジョブと同方針)。
      KIMITERRACE_TEST_DB_OK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # @kimiterrace/web は @kimiterrace/db の dist (./dist/index.js) を解決する。
      # turbo の test/build タスクは ^build で db を先にビルドするが、ここは web の
      # test:e2e を直接叩くため db の dist を明示的に用意する (これが無いと next build が
      # Module not found: '@kimiterrace/db' で落ちる)。
      - name: Build workspace deps (@kimiterrace/db dist)
        run: pnpm --filter @kimiterrace/db build
      - name: Install Playwright browsers
        run: pnpm --filter @kimiterrace/web exec playwright install --with-deps chromium
      # Auth emulator は Java を要する (ubuntu runner には JDK が同梱)。明示セットアップで安定化。
      - name: Set up JDK (Firebase Auth emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # firebase emulators:exec が Auth emulator を起動 → FIREBASE_AUTH_EMULATOR_HOST /
      # GOOGLE_CLOUD_PROJECT を子プロセス (playwright → webServer → auth.setup) に伝播 → 終了で停止。
      # これで signage golden-path に加え 認証 e2e (教員ログイン到達) も RLS + emulator 下で実走する。
      - name: Run e2e (Auth emulator + globalSetup migrate+seed → webServer → signage + 認証 描画検証)
        run: pnpm --filter @kimiterrace/web test:e2e:auth

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ---------------------------------------------------------------------------
  # GCP auth smoke test via Workload Identity Federation.
  #
  # Verifies the WIF path provisioned by
  # infrastructure/terraform/modules/workload_identity_federation/ is reachable
  # from this workflow without a service account JSON key (CLAUDE.md rule 5).
  #
  # The job is skipped on forks and until the repo vars `WIF_PROVIDER` and
  # `WIF_SA_PLAN` are configured (see docs/runbooks/github-actions-auth.md).
  # Once configured it MUST stay green.
  # ---------------------------------------------------------------------------
  gcp-auth:
    name: GCP Auth (WIF)
    runs-on: ubuntu-latest
    if: ${{ vars.WIF_PROVIDER != '' && vars.WIF_SA_PLAN != '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA_PLAN }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify identity
        run: |
          gcloud auth list
          gcloud config list
