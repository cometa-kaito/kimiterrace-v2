name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Biome
        run: pnpm exec biome ci .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kimiterrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kimiterrace_test

  # ---------------------------------------------------------------------------
  # e2e (Playwright) — F0 #48-O 第 1 増分: 基盤確立のみ。
  #
  # スモークは DB / 認証に依存しない /login の描画 1 本だけ。Playwright の webServer が
  # 本番ビルド (next build) + 起動 (next start) を担うので、このジョブは Postgres service を
  # 付けない。後続増分で「ログイン→エディタ更新→サイネージ反映」golden path を足す際に
  # postgres service + DB seed を追加する (test ジョブの services ブロックを参照)。
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # @kimiterrace/web は @kimiterrace/db の dist (./dist/index.js) を解決する。
      # turbo の test/build タスクは ^build で db を先にビルドするが、ここは web の
      # test:e2e を直接叩くため db の dist を明示的に用意する (これが無いと next build が
      # Module not found: '@kimiterrace/db' で落ちる)。
      - name: Build workspace deps (@kimiterrace/db dist)
        run: pnpm --filter @kimiterrace/db build
      - name: Install Playwright browsers
        run: pnpm --filter @kimiterrace/web exec playwright install --with-deps chromium
      - name: Run e2e (Playwright webServer builds + starts the app)
        run: pnpm --filter @kimiterrace/web test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ---------------------------------------------------------------------------
  # GCP auth smoke test via Workload Identity Federation.
  #
  # Verifies the WIF path provisioned by
  # infrastructure/terraform/modules/workload_identity_federation/ is reachable
  # from this workflow without a service account JSON key (CLAUDE.md rule 5).
  #
  # The job is skipped on forks and until the repo vars `WIF_PROVIDER` and
  # `WIF_SA_PLAN` are configured (see docs/runbooks/github-actions-auth.md).
  # Once configured it MUST stay green.
  # ---------------------------------------------------------------------------
  gcp-auth:
    name: GCP Auth (WIF)
    runs-on: ubuntu-latest
    if: ${{ vars.WIF_PROVIDER != '' && vars.WIF_SA_PLAN != '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA_PLAN }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify identity
        run: |
          gcloud auth list
          gcloud config list
