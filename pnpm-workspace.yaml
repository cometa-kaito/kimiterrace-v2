packages:
  - "apps/*"
  - "packages/*"

# 推移的依存の脆弱性を patched バージョンへ固定 (Dependabot moderate)。
# どちらも同一メジャー / pre-1.0 minor 内の引き上げで親パッケージの API 互換を維持。
# - postcss <8.5.10: XSS via unescaped </style> in stringify (GHSA-qx2v-qp2m-jg93)。next 経由で runtime。
# - jsondiffpatch <0.7.2: XSS in HtmlFormatter::nodeBegin (GHSA-33vc-wfww-vjfv)。ai SDK 経由で runtime。
# - tar <7.5.1: node-tar の path traversal / symlink poisoning 系 high 6 件
#   (GHSA-8qq5-rm4j-mr97 等)。firebase-tools (認証 e2e の Auth emulator、#48-O、**devDependency**) が
#   tar@6.2.1 を引き込む。6.x に patch 版が無いため 7.5.1+ へ引き上げ。tar は dev ツールチェーンの
#   アーカイブ展開 (emulator JAR の解凍) にのみ使われ Cloud Run runtime には載らない。CI e2e で
#   emulator 起動 (= tar 展開経路) が green であることを確認済 (PR #224)。
overrides:
  "postcss@<8.5.10": "^8.5.10"
  "jsondiffpatch@<0.7.2": "^0.7.2"
  "tar@<7.5.1": "^7.5.1"
  # vite / esbuild moderate (#177, GHSA-4w7w-66w2-5vf9 / GHSA-67mh-4wv8-2f99)。dev/test ツールチェーン
  # (vitest 3) のみ、Cloud Run runtime には非搭載。vitest 3.x は vite 6/7 対応なので 6.4.2+ へ引き上げ可。
  # esbuild は vite 6 が要求する 0.25+ に揃え、@esbuild-kit (drizzle-kit) 経由の 0.18.20 も同時に patched 化。
  "vite@<6.4.2": "^6.4.2"
  "esbuild@<0.25.0": "^0.25.0"

allowBuilds:
  "@biomejs/biome": true
  "@firebase/util": false
  esbuild: true
  protobufjs: true
  # re2 は firebase-tools (認証 e2e の Auth emulator、#48-O) が引き込む optional native dep。
  # emulator 起動に native ビルドは不要なので承認しない (install を非対話的に通す)。
  re2: false
  sharp: true
